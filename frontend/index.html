<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مواقيت الصلاة</title>
    <link rel="icon" type="image/png" href="public/app-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="public/css/styles.css">
</head>
<body>
    <div class="overlay" id="overlay"></div>

    <div class="container">
        <div class="header-bar">
            <select class="location-select" id="location-select">
                <option value="Riyadh" selected>الرياض - Riyadh</option>
                <option value="Jeddah">جدة - Jeddah</option>
                <option value="Mecca">مكة المكرمة - Mecca</option>
                <option value="Medina">المدينة المنورة - Medina</option>
                <option value="Dammam">الدمام - Dammam</option>
                <option value="Tabuk">تبوك - Tabuk</option>
                <option value="Abha">أبها - Abha</option>
                <option value="Buraydah">بريدة - Buraydah</option>
                <option value="Khamis Mushait">خميس مشيط - Khamis Mushait</option>
                <option value="Khobar">الخبر - Khobar</option>
                <option value="Dhahran">الظهران - Dhahran</option>
                <option value="Jubail">الجبيل - Jubail</option>
                <option value="Hail">حائل - Hail</option>
                <option value="Najran">نجران - Najran</option>
                <option value="Jizan">جازان - Jizan</option>
                <option value="Yanbu">ينبع - Yanbu</option>
                <option value="Al Qunfudhah">القنفذة - Al Qunfudhah</option>
                <option value="Al Kharj">الخرج - Al Kharj</option>
                <option value="Al Hofuf">الأفلاج - Al Hofuf</option>
                <option value="Sakakah">سكاكا - Sakakah</option>
                <option value="Arar">عرعر - Arar</option>
                <option value="Ras Tanura">رأس تنورة - Ras Tanura</option>
                <option value="Al Jubayl">الجبيل - Al Jubayl</option>
                <option value="Bisha">بيشة - Bisha</option>
                <option value="Al Mubarraz">المبرز - Al Mubarraz</option>
                <option value="Samtah">صامطة - Samtah</option>
                <option value="Zulfi">الزلفي - Zulfi</option>
                <option value="Wadi Al-Dawaser">وادي الدواسر - Wadi Al-Dawaser</option>
            </select>
            <button class="gear-btn" id="gear-btn" title="Settings">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.611 3.611 0 0112 15.6z"/></svg>
            </button>

            <div class="settings-panel" id="settings-panel">
                <div class="settings-row">
                    <span class="settings-label" id="settings-lang-label">اللغة</span>
                    <button class="settings-option-btn active" id="lang-btn">EN</button>
                </div>
                <div class="settings-row">
                    <span class="settings-label" id="settings-format-label">التوقيت</span>
                    <div class="time-toggle">
                        <span class="toggle-label" id="label-24">24</span>
                        <label class="switch">
                            <input type="checkbox" id="time-format-toggle" checked>
                            <span class="slider"></span>
                        </label>
                        <span class="toggle-label" id="label-12">12</span>
                    </div>
                </div>
                <div class="settings-row">
                    <span class="settings-label" id="settings-theme-label">المظهر</span>
                    <button class="settings-option-btn" id="theme-btn">
                        <span class="icon-sun" id="icon-sun">&#9788;</span>
                        <span class="icon-moon" id="icon-moon">&#9790;</span>
                    </button>
                </div>
            </div>
        </div>

        <main class="main-content">
            <div class="prayers-panel">
                <div class="prayer-row" data-prayer="Fajr">
                    <span class="prayer-name" id="fajr-name">الفجر</span>
                    <span class="prayer-time" id="fajr-time">--:--</span>
                </div>
                <div class="prayer-row" data-prayer="Dhuhr">
                    <span class="prayer-name" id="dhuhr-name">الظهر</span>
                    <span class="prayer-time" id="dhuhr-time">--:--</span>
                </div>
                <div class="prayer-row" data-prayer="Asr">
                    <span class="prayer-name" id="asr-name">العصر</span>
                    <span class="prayer-time" id="asr-time">--:--</span>
                </div>
                <div class="prayer-row" data-prayer="Maghrib">
                    <span class="prayer-name" id="maghrib-name">المغرب</span>
                    <span class="prayer-time" id="maghrib-time">--:--</span>
                </div>
                <div class="prayer-row" data-prayer="Isha">
                    <span class="prayer-name" id="isha-name">العشاء</span>
                    <span class="prayer-time" id="isha-time">--:--</span>
                </div>
            </div>

            <div class="timer-panel">
                <div class="hijri-date" id="hijri-date"></div>
                <div class="timer-status" id="timer-status">الوقت المتبقي للأذان</div>
                <div class="timer" id="timer">00:00:00</div>
                <div class="next-prayer" id="next-prayer"></div>
                <div class="share-bar">
                    <button class="share-btn whatsapp" id="share-whatsapp" title="Share on WhatsApp">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                    </button>
                    <button class="share-btn twitter" id="share-twitter" title="Share on Twitter">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                    </button>
                </div>
            </div>
        </main>

        <footer>
            <p id="footer-text">مواقيت الصلاة للرياض | حسب طريقة أم القرى</p>
        </footer>
    </div>

    <script src="public/js/script.js"></script>
</body>
</html>
