<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مواقيت الصلاة - الرياض</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="public/css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 id="title">مواقيت الصلاة</h1>
            <p class="city" id="city">الرياض، المملكة العربية السعودية</p>
            <div class="hijri-date" id="hijri-date"></div>
        </header>

        <div class="settings-bar">
            <button class="lang-btn" id="lang-btn">EN</button>
            <div class="time-toggle">
                <span class="toggle-label" id="label-24">24</span>
                <label class="switch">
                    <input type="checkbox" id="time-format-toggle" checked>
                    <span class="slider"></span>
                </label>
                <span class="toggle-label" id="label-12">12</span>
            </div>
        </div>

        <main class="main-content">
            <div class="prayers-panel">
                <div class="prayer-row" data-prayer="Fajr">
                    <span class="prayer-name" id="fajr-name">الفجر</span>
                    <span class="prayer-time" id="fajr-time">--:--</span>
                </div>
                <div class="prayer-row" data-prayer="Dhuhr">
                    <span class="prayer-name" id="dhuhr-name">الظهر</span>
                    <span class="prayer-time" id="dhuhr-time">--:--</span>
                </div>
                <div class="prayer-row" data-prayer="Asr">
                    <span class="prayer-name" id="asr-name">العصر</span>
                    <span class="prayer-time" id="asr-time">--:--</span>
                </div>
                <div class="prayer-row" data-prayer="Maghrib">
                    <span class="prayer-name" id="maghrib-name">المغرب</span>
                    <span class="prayer-time" id="maghrib-time">--:--</span>
                </div>
                <div class="prayer-row" data-prayer="Isha">
                    <span class="prayer-name" id="isha-name">العشاء</span>
                    <span class="prayer-time" id="isha-time">--:--</span>
                </div>
            </div>

            <div class="timer-panel">
                <div class="timer-status" id="timer-status">الوقت المتبقي للأذان</div>
                <div class="timer" id="timer">00:00:00</div>
                <div class="next-prayer" id="next-prayer"></div>
            </div>
        </main>

        <footer>
            <p id="footer-text">مواقيت الصلاة للرياض | حسب طريقة أم القرى</p>
        </footer>
    </div>

    <script src="public/js/script.js"></script>
</body>
</html>
